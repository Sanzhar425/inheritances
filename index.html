<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наследство</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Наследство</a>
  <div class="search-wrap">
    <input type="text" id="searchInput" oninput="handleSearch()">
  </div>
  <nav class="nav">
    <button class="nav-btn hide-tablet" onclick="openFilterModal()" id="btnFilter"></button>
    <button class="nav-btn hide-tablet" onclick="openFavoritesModal()" id="btnFavNav">❤️ <span id="favNavLabel"></span> <span class="fav-badge" id="favCount">0</span></button>
    <select class="lang-sel hide-tablet" onchange="switchLang(this.value)" id="langSelDesktop">
      <option value="RU">RU</option>
      <option value="KZ">ҚЗ</option>
      <option value="EN">EN</option>
    </select>
    <a href="profile.html" class="cabinet-btn" id="btnCabinet"></a>
    <button class="burger" onclick="openMobileNav()">☰</button>
  </nav>
</header>

<div class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-overlay" onclick="closeMobileNav()"></div>
  <div class="mobile-nav-panel">
    <div class="mobile-nav-header"><span id="mnMenuLabel"></span><button class="close-nav" onclick="closeMobileNav()">✕</button></div>
    <input class="mobile-search" type="text" id="mobileSearchInput" oninput="handleSearchMobile(this.value)">
    <a href="profile.html" class="mobile-nav-item green" id="mnCabinet"></a>
    <button class="mobile-nav-item" onclick="openFavoritesModal();closeMobileNav()">❤️ <span id="mnFavLabel"></span> <span class="fav-badge" id="favCountMobile">0</span></button>
    <button class="mobile-nav-item" onclick="openFilterModal();closeMobileNav()" id="mnFilter"></button>
    <button class="mobile-nav-item sell-item" onclick="openCreateModal();closeMobileNav()" id="mnSell"></button>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;">
      <label style="font-size:12px;color:#999;display:block;margin-bottom:6px;" id="mnLangLabel"></label>
      <select class="lang-sel" onchange="switchLang(this.value)" id="langSelMobile" style="width:100%;">
        <option value="RU">RU — Русский</option>
        <option value="KZ">ҚЗ — Қазақша</option>
        <option value="EN">EN — English</option>
      </select>
    </div>
  </div>
</div>

<main class="container">
  <div class="listings-grid" id="listingsGrid"></div>
</main>

<button class="fab-sell" onclick="openCreateModal()" title="">
  <span class="fab-icon">＋</span>
  <span class="fab-text" id="fabText"></span>
</button>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="product-modal">
    <div style="position:relative;">
      <button onclick="closeModals()" class="pm-back-btn">←</button>
      <img id="pmImage" src="" class="pm-img" alt="">
    </div>
    <div class="pm-body">
      <div id="pmPrice" class="pm-price"></div>
      <div id="pmTitle" class="pm-title"></div>
      <div id="pmDesc" style="font-size:14px;color:#555;margin-bottom:14px;line-height:1.5;"></div>
      <div class="pm-seller">
        <img id="pmAvatar" src="" alt="">
        <div>
          <div id="pmSellerName" class="pm-seller-name"></div>
          <div class="pm-verified"><span class="pm-verified-dot">✓</span><span id="pmVerifiedLabel"></span></div>
        </div>
      </div>
      <div class="pm-loc">📍 <span id="pmLocation"></span></div>
      <button class="btn-wa" id="pmWhatsapp"></button>
      <button class="btn-res" id="pmFavBtn" onclick="toggleFavFromModal()"></button>
    </div>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h2 id="createModalTitle"></h2>
    <label id="lblCreateName"></label><input type="text" id="createTitle">
    <label id="lblCreatePrice"></label><input type="number" id="createPrice">
    <label id="lblCreateCat"></label>
    <select id="createCat">
      <option value="tech" id="optTech"></option>
      <option value="books" id="optBooks"></option>
      <option value="furniture" id="optFurniture"></option>
    </select>
    <label id="lblCreateDesc"></label><textarea id="createDesc"></textarea>
    <label id="lblCreatePhoto"></label><input type="text" id="createImg" placeholder="https://...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()" id="btnCreateCancel"></button>
      <button class="btn-primary" onclick="createListing()" id="btnPublish"></button>
    </div>
  </div>
</div>

<!-- FILTER MODAL -->
<div class="modal-overlay" id="filterModal">
  <div class="modal" style="max-width:380px;">
    <h2 id="filterModalTitle"></h2>
    <label id="lblFilterPrice"></label><input type="number" id="filterMax">
    <label id="lblFilterCat"></label>
    <select id="filterCatSel">
      <option value="all" id="optFilterAll"></option>
      <option value="tech" id="optFilterTech"></option>
      <option value="books" id="optFilterBooks"></option>
      <option value="furniture" id="optFilterFurniture"></option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="clearFilters()" id="btnClearFilter"></button>
      <button class="btn-primary" onclick="applyFilter()" id="btnApplyFilter"></button>
    </div>
  </div>
</div>

<!-- FAVORITES MODAL -->
<div class="modal-overlay" id="favModal">
  <div class="fav-modal">
    <div class="fav-modal-header"><h2 id="favModalTitle"></h2><button class="close-x" onclick="closeModals()">✕</button></div>
    <div class="fav-modal-body"><div class="listings-grid fav-grid" id="favGrid"></div></div>
  </div>
</div>

let currentLang = localStorage.getItem('lang') || 'RU';

function t(key) {
  return (LANG[currentLang] || LANG.RU)[key] || key;
}

  document.getElementById('btnFavNav').innerHTML = `❤️ ${t('favorites')} <span class="fav-badge" id="favCount">${DB.getFavorites().length}</span>`;

function switchLang(val) {
  currentLang = val;
  localStorage.setItem('lang', val);
  applyLang();
}

const DB = {
  _get(k) { try { return JSON.parse(localStorage.getItem(k)) ?? null; } catch { return null; } },
  _set(k,v) { localStorage.setItem(k, JSON.stringify(v)); },
  _id() { return Date.now() + Math.floor(Math.random() * 1000); },
  init() {
    if (this._get('db_v2')) return;
    const userId = this._id();
    const now = Date.now();
    this._set('current_user', { id: userId, name: 'Ержан С.', email: 'erzhan@test.kz', location: 'КазНУ, Общежитие №17', avatar: null, rating: 5.0, reviews: 12, verified: true });
    this._set('listings', [
      { id: this._id(), userId, title: 'Микроволновка Samsung', price: 8500, category: 'tech', description: 'В отличном состоянии, использовалась 1 год', image: 'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?w=400&h=300&fit=crop', status: 'active', views: 204, createdAt: now - 86400000*5 },
      { id: this._id(), userId, title: 'Диван-кровать', price: 6000, category: 'furniture', description: 'Удобный, раскладывается', image: 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&h=300&fit=crop', status: 'active', views: 168, createdAt: now - 86400000*4 },
      { id: this._id(), userId, title: 'Письменный стол', price: 3500, category: 'furniture', description: 'Деревянный, без дефектов', image: 'https://images.unsplash.com/photo-1593642632651-d3fba3ca8d1d?w=400&h=300&fit=crop', status: 'sold', views: 98, createdAt: now - 86400000*3 },
      { id: this._id(), userId, title: 'Утюг Philips', price: 4500, category: 'tech', description: 'Паровой, почти новый', image: 'https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=400&h=300&fit=crop', status: 'sold', views: 143, createdAt: now - 86400000*2 },
      { id: this._id(), userId, title: 'Учебник по матанализу', price: 1200, category: 'books', description: '2-е издание, без пометок', image: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=300&fit=crop', status: 'active', views: 77, createdAt: now - 86400000 },
      { id: this._id(), userId, title: 'Электрочайник Bosch', price: 5500, category: 'tech', description: '1.7 л, быстрый нагрев', image: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&h=300&fit=crop', status: 'active', views: 120, createdAt: now },
    ]);
    this._set('favorites', []);
    this._set('messages', []);
    this._set('db_v2', true);
  },
  getUser() { return this._get('current_user'); },
  saveUser(d) { const u = {...this.getUser(),...d}; this._set('current_user',u); return u; },
  getListings({category,maxPrice,search,status}={}) {
    let l = this._get('listings') ?? [];
    if (status && status!=='all') l = l.filter(x=>x.status===status);
    if (category && category!=='all') l = l.filter(x=>x.category===category);
    if (maxPrice) l = l.filter(x=>x.price<=Number(maxPrice));
    if (search) l = l.filter(x=>x.title.toLowerCase().includes(search.toLowerCase()));
    return l.sort((a,b)=>b.createdAt-a.createdAt);
  },
  getListing(id) { return (this._get('listings')??[]).find(l=>l.id===id)??null; },
  addListing(d) { const l=this._get('listings')??[]; const item={id:this._id(),userId:this.getUser()?.id,views:0,status:'active',createdAt:Date.now(),...d}; l.unshift(item); this._set('listings',l); return item; },
  updateListing(id,d) { const l=this._get('listings')??[]; const i=l.findIndex(x=>x.id===id); if(i===-1)return null; l[i]={...l[i],...d}; this._set('listings',l); return l[i]; },
  deleteListing(id) { this._set('listings',(this._get('listings')??[]).filter(l=>l.id!==id)); this._set('favorites',(this._get('favorites')??[]).filter(f=>f!==id)); },
  incrementViews(id) { const l=this.getListing(id); if(l)this.updateListing(id,{views:(l.views||0)+1}); },
  getFavorites() { return this._get('favorites')??[]; },
  isFavorite(id) { return this.getFavorites().includes(id); },
  toggleFavorite(id) { const f=this.getFavorites(); const n=f.includes(id)?f.filter(x=>x!==id):[...f,id]; this._set('favorites',n); return n.includes(id); },
  getFavoriteListings() { const f=this.getFavorites(); return (this._get('listings')??[]).filter(l=>f.includes(l.id)); },
  getMessages() { return this._get('messages')??[]; },
  getCategoryName(id) {
    const map = { tech: 'tech', books: 'books', furniture: 'furniture' };
    return t(map[id]) || id;
  },
};

DB.init();
let activeFilter = { cat:'all', maxPrice:null, search:'' };
let currentProductId = null;

function cardHTML(item) {
  const isFav = DB.isFavorite(item.id);
  const user = DB.getUser();
  return `<div class="listing-card" onclick="openProduct(${item.id})">
    <div class="card-img-wrap">
      <img src="${item.image||'https://via.placeholder.com/400x300?text=No+photo'}" alt="${item.title}" class="card-img" onerror="this.src='https://via.placeholder.com/400x300?text=No+photo'">
      ${item.status==='sold'?`<div class="card-badge sold">${t('sold')}</div>`:''}
      <button class="fav-btn" onclick="toggleFav(event,${item.id})">${isFav?'❤️':'🤍'}</button>
    </div>
    <div class="card-body">
      <div class="card-price">${item.price.toLocaleString('ru')} ₸</div>
      <div class="card-title">${item.title}</div>
      <div class="card-meta"><span>👁️ ${item.views}</span><span>📦 ${DB.getCategoryName(item.category)}</span></div>
      <div class="card-seller">
        <img src="https://i.pravatar.cc/60?u=${item.userId}" class="card-avatar" alt="">
        <div><div class="card-seller-name">${user?.name||t('seller')}</div><div class="card-seller-loc">📍 ${user?.location||''}</div></div>
      </div>
    </div>
  </div>`;
}

function render() {
  const data = DB.getListings(activeFilter);
  document.getElementById('listingsGrid').innerHTML = data.length
    ? data.map(cardHTML).join('')
    : `<div class="empty-state"><span class="empty-icon">🔍</span>${t('notFound')}</div>`;
  const n = DB.getFavorites().length;
  const fc = document.getElementById('favCount');
  const fcm = document.getElementById('favCountMobile');
  if (fc) fc.textContent = n;
  if (fcm) fcm.textContent = n;
}

function handleSearch() { activeFilter.search = document.getElementById('searchInput').value; render(); }
function handleSearchMobile(v) { activeFilter.search = v; render(); }

function openFilterModal() { document.getElementById('filterModal').classList.add('open'); }
function applyFilter() {
  const max = document.getElementById('filterMax').value;
  activeFilter.maxPrice = max ? parseInt(max) : null;
  activeFilter.cat = document.getElementById('filterCatSel').value;
  closeModals(); render(); showToast(t('filterApplied'));
}
function clearFilters() {
  activeFilter = {cat:'all',maxPrice:null,search:''};
  document.getElementById('filterMax').value = '';
  document.getElementById('filterCatSel').value = 'all';
  document.getElementById('searchInput').value = '';
  closeModals(); render(); showToast(t('filterCleared'));
}

function toggleFav(e, id) {
  e.stopPropagation();
  const added = DB.toggleFavorite(id);
  showToast(added ? t('addedFav') : t('removedFav'));
  render();
  if (currentProductId===id) updateFavBtn(id);
}
function toggleFavFromModal() {
  if (!currentProductId) return;
  const added = DB.toggleFavorite(currentProductId);
  showToast(added ? t('addedFav') : t('removedFav'));
  updateFavBtn(currentProductId); render();
}
function updateFavBtn(id) {
  const btn = document.getElementById('pmFavBtn');
  if (btn) btn.textContent = DB.isFavorite(id) ? t('inFav') : t('toFav');
}

function openFavoritesModal() {
  const items = DB.getFavoriteListings();
  document.getElementById('favGrid').innerHTML = items.length
    ? items.map(i=>`<div class="listing-card" onclick="openProduct(${i.id});closeModals();">
        <div class="card-img-wrap">
          <img src="${i.image||'https://via.placeholder.com/400x200'}" class="card-img" alt="">
          ${i.status==='sold'?`<div class="card-badge sold">${t('sold')}</div>`:''}
        </div>
        <div class="card-body">
          <div class="card-price">${i.price.toLocaleString('ru')} ₸</div>
          <div class="card-title">${i.title}</div>
        </div>
      </div>`).join('')
    : `<div class="empty-state"><span class="empty-icon">🤍</span>${t('noFavs')}</div>`;
  document.getElementById('favModal').classList.add('open');
}

function openProduct(id) {
  const item = DB.getListing(id); if (!item) return;
  DB.incrementViews(id); currentProductId = id;
  const user = DB.getUser();
  document.getElementById('pmImage').src = item.image||'https://via.placeholder.com/520x240?text=No+photo';
  document.getElementById('pmTitle').textContent = item.title;
  document.getElementById('pmPrice').textContent = item.price.toLocaleString('ru')+' ₸';
  document.getElementById('pmDesc').textContent = item.description||'';
  document.getElementById('pmSellerName').textContent = user?.name||t('seller');
  document.getElementById('pmAvatar').src = `https://i.pravatar.cc/80?u=${item.userId}`;
  document.getElementById('pmLocation').textContent = (user?.location||'')+t('pickup');
  document.getElementById('pmVerifiedLabel').textContent = t('verified');
  document.getElementById('pmWhatsapp').textContent = t('whatsapp');
  document.getElementById('pmWhatsapp').onclick = ()=>window.open(`https://wa.me/?text=${encodeURIComponent(item.title+' — '+item.price+' ₸')}`, '_blank');
  updateFavBtn(id);
  document.getElementById('productModal').classList.add('open');
  render();
}

function openCreateModal() { document.getElementById('createModal').classList.add('open'); }
function createListing() {
  const title = document.getElementById('createTitle').value.trim();
  const price = parseInt(document.getElementById('createPrice').value);
  if (!title||!price) { showToast(t('fillFields')); return; }
  DB.addListing({ title, price, category: document.getElementById('createCat').value, description: document.getElementById('createDesc').value.trim(), image: document.getElementById('createImg').value.trim()||'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop' });
  closeModals(); render(); showToast(t('published'));
  ['createTitle','createPrice','createDesc','createImg'].forEach(id=>document.getElementById(id).value='');
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open')); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModals();}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});
function openMobileNav() { document.getElementById('mobileNav').classList.add('open'); }
function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

applyLang();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наследство</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>
  <script src="db.js"></script>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Наследство</a>
  <div class="search-wrap">
    <input type="text" id="searchInput" oninput="handleSearch()">
  </div>
  <nav class="nav">
    <button class="nav-btn hide-tablet" onclick="openFilterModal()" id="btnFilter"></button>
    <button class="nav-btn hide-tablet" onclick="openFavoritesModal()" id="btnFavNav">❤️ <span id="favNavLabel"></span> <span class="fav-badge" id="favCount">0</span></button>
    <select class="lang-sel hide-tablet" onchange="switchLang(this.value)" id="langSelDesktop">
      <option value="RU">RU</option>
      <option value="KZ">ҚЗ</option>
      <option value="EN">EN</option>
    </select>
    <div class="auth-btns hide-tablet" id="guestButtons">
      <button class="btn-login" onclick="openLoginModal()" id="btnLogin"></button>
      <button class="btn-register" onclick="openRegisterModal()" id="btnRegister"></button>
    </div>
    <a href="profile.html" class="cabinet-btn" id="btnCabinet" style="display:none;"></a>
    <button class="burger" onclick="openMobileNav()">☰</button>
  </nav>
</header>

<div class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-overlay" onclick="closeMobileNav()"></div>
  <div class="mobile-nav-panel">
    <div class="mobile-nav-header"><span id="mnMenuLabel"></span><button class="close-nav" onclick="closeMobileNav()">✕</button></div>
    <input class="mobile-search" type="text" id="mobileSearchInput" oninput="handleSearchMobile(this.value)">
    <div id="mnAuthSection">
      <button class="mobile-nav-item" onclick="openLoginModal();closeMobileNav()" id="mnLogin" style="background:#e8f5e9;color:#2d7e32;"></button>
      <button class="mobile-nav-item" onclick="openRegisterModal();closeMobileNav()" id="mnRegister" style="background:#2d7e32;color:white;"></button>
    </div>
    <a href="profile.html" class="mobile-nav-item green" id="mnCabinet" style="display:none;"></a>
    <button class="mobile-nav-item" onclick="openFavoritesModal();closeMobileNav()">❤️ <span id="mnFavLabel"></span> <span class="fav-badge" id="favCountMobile">0</span></button>
    <button class="mobile-nav-item" onclick="openFilterModal();closeMobileNav()" id="mnFilter"></button>
    <button class="mobile-nav-item sell-item" onclick="openCreateModal();closeMobileNav()" id="mnSell"></button>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;">
      <label style="font-size:12px;color:#999;display:block;margin-bottom:6px;" id="mnLangLabel"></label>

<button class="fab-sell" onclick="openCreateModal()" title="">

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">

    <div class="modal-actions">

    </div>
    <div class="auth-switch" id="loginSwitch"></div>
  </div>
</div>

<!-- REGISTER MODAL -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <h2 id="registerTitle"></h2>
    <label id="lblRegName"></label>

    <div class="field-error" id="regNameErr"></div>
    <label id="lblRegEmail"></label>
    <input type="email" id="regEmail" autocomplete="email">
    <div class="field-error" id="regEmailErr"></div>
    <label id="lblRegPassword"></label>
    <input type="password" id="regPassword" autocomplete="new-password">
    <div class="field-error" id="regPasswordErr"></div>
    <label id="lblRegLocation"></label>
    <input type="text" id="regLocation">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()" id="btnRegCancel"></button>
      <button class="btn-primary" onclick="doRegister()" id="btnRegSubmit"></button>
    </div>
    <div class="auth-switch" id="registerSwitch"></div>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="createModal">

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()" id="btnCreateCancel"></button>
      <button class="btn-primary" onclick="createListing()" id="btnPublish"></button>
    </div>
  </div>
</div>

<!-- FILTER MODAL -->
<div class="modal-overlay" id="filterModal">

function t(key) { return (LANG[currentLang] || LANG.RU)[key] || key; }

function updateHeaderAuth() {
  const loggedIn = Auth.isLoggedIn();
  const user = Auth.currentUser();
  const guestBtns = document.getElementById('guestButtons');
  const cabinetBtn = document.getElementById('btnCabinet');
  const mnAuth = document.getElementById('mnAuthSection');
  const mnCabinet = document.getElementById('mnCabinet');
  if (loggedIn) {
    guestBtns.style.display = 'none';
    cabinetBtn.style.display = '';
    cabinetBtn.textContent = `👤 ${user.name.split(' ')[0]}`;
    mnAuth.style.display = 'none';
    mnCabinet.style.display = '';
    mnCabinet.textContent = t('cabinet');
  } else {
    guestBtns.style.display = 'flex';
    cabinetBtn.style.display = 'none';
    mnAuth.style.display = 'block';
    mnCabinet.style.display = 'none';
    document.getElementById('btnLogin').textContent = t('login');
    document.getElementById('btnRegister').textContent = t('register');
    document.getElementById('mnLogin').textContent = t('login');
    document.getElementById('mnRegister').textContent = t('register');
  }
}

/* ── AUTH MODALS ──────────────────────────────── */
function openLoginModal() {
  closeModals();
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('show'));
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginModal').classList.add('open');
}
function openRegisterModal() {
  closeModals();
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('show'));
  ['regName','regEmail','regPassword','regLocation'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('registerModal').classList.add('open');
}
function showErr(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }

function doLogin() {
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('show'));
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  let ok = true;
  if (!email) { showErr('loginEmailErr', t('errRequired')); ok=false; }
  else if (!/\S+@\S+\.\S+/.test(email)) { showErr('loginEmailErr', t('errInvalidEmail')); ok=false; }
  if (!password) { showErr('loginPasswordErr', t('errRequired')); ok=false; }
  if (!ok) return;
  const res = Auth.login(email, password);
  if (res.err === 'notFound') { showErr('loginGeneralErr', t('errNotFound')); return; }
  if (res.err === 'wrongPassword') { showErr('loginGeneralErr', t('errWrongPassword')); return; }
  closeModals(); showToast(t('loginSuccess')); updateHeaderAuth(); render();
}

function doRegister() {
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('show'));
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const location = document.getElementById('regLocation').value.trim();
  let ok = true;
  if (!name) { showErr('regNameErr', t('errRequired')); ok=false; }
  if (!email) { showErr('regEmailErr', t('errRequired')); ok=false; }
  else if (!/\S+@\S+\.\S+/.test(email)) { showErr('regEmailErr', t('errInvalidEmail')); ok=false; }
  if (!password) { showErr('regPasswordErr', t('errRequired')); ok=false; }
  else if (password.length < 6) { showErr('regPasswordErr', t('errShortPassword')); ok=false; }
  if (!ok) return;
  const res = Auth.register(name, email, password, location);
  if (res.err === 'emailExists') { showErr('regEmailErr', t('errEmailExists')); return; }
  closeModals(); showToast(t('registerSuccess')); updateHeaderAuth(); render();
}

DB.init();
let activeFilter = { cat:'all', maxPrice:null, search:'' };
let currentProductId = null;

function cardHTML(item) {
  const isFav = DB.isFavorite(item.id);
  const sellerName = item.sellerName || t('seller');
  const sellerLocation = item.sellerLocation || '';
  return `<div class="listing-card" onclick="openProduct(${item.id})">
    <div class="card-img-wrap">
      <img src="${item.image||'https://via.placeholder.com/400x300?text=No+photo'}" alt="${item.title}" class="card-img" onerror="this.src='https://via.placeholder.com/400x300?text=No+photo'">
      ${item.status==='sold'?`<div class="card-badge sold">${t('sold')}</div>`:''}
      <button class="fav-btn" onclick="toggleFav(event,${item.id})">${isFav?'❤️':'🤍'}</button>
    </div>
    <div class="card-body">
      <div class="card-price">${item.price.toLocaleString('ru')} ₸</div>
      <div class="card-title">${item.title}</div>
      <div class="card-meta"><span>👁️ ${item.views}</span><span>📦 ${DB.getCategoryName(item.category)}</span></div>
      <div class="card-seller">
        <img src="https://i.pravatar.cc/60?u=${item.userId}" class="card-avatar" alt="">
        <div><div class="card-seller-name">${sellerName}</div><div class="card-seller-loc">📍 ${sellerLocation}</div></div>
      </div>
    </div>
  </div>`;
}

function render() {
  const data = DB.getListings(activeFilter);
  document.getElementById('listingsGrid').innerHTML = data.length
    ? data.map(cardHTML).join('')
    : `<div class="empty-state"><span class="empty-icon">🔍</span>${t('notFound')}</div>`;
  const n = DB.getFavorites().length;
  const fc = document.getElementById('favCount'); if(fc) fc.textContent = n;
  const fcm = document.getElementById('favCountMobile'); if(fcm) fcm.textContent = n;
}

function handleSearch() { activeFilter.search = document.getElementById('searchInput').value; render(); }
function handleSearchMobile(v) { activeFilter.search = v; render(); }

function openFilterModal() { document.getElementById('filterModal').classList.add('open'); }
function applyFilter() {
  activeFilter.maxPrice = document.getElementById('filterMax').value ? parseInt(document.getElementById('filterMax').value) : null;
  activeFilter.cat = document.getElementById('filterCatSel').value;
  closeModals(); render(); showToast(t('filterApplied'));
}
function clearFilters() {
  activeFilter = {cat:'all',maxPrice:null,search:''};
  document.getElementById('filterMax').value = '';
  document.getElementById('filterCatSel').value = 'all';
  document.getElementById('searchInput').value = '';
  closeModals(); render(); showToast(t('filterCleared'));
}

function toggleFav(e, id) {
  e.stopPropagation();
  showToast(DB.toggleFavorite(id) ? t('addedFav') : t('removedFav'));
  render(); if(currentProductId===id) updateFavBtn(id);
}
function toggleFavFromModal() {
  if(!currentProductId) return;
  showToast(DB.toggleFavorite(currentProductId) ? t('addedFav') : t('removedFav'));
  updateFavBtn(currentProductId); render();
}
function updateFavBtn(id) { const btn=document.getElementById('pmFavBtn'); if(btn) btn.textContent=DB.isFavorite(id)?t('inFav'):t('toFav'); }

function openFavoritesModal() {
  const items = DB.getFavoriteListings();
  document.getElementById('favGrid').innerHTML = items.length
    ? items.map(i=>`<div class="listing-card" onclick="openProduct(${i.id});closeModals();">
        <div class="card-img-wrap"><img src="${i.image}" class="card-img" alt="">${i.status==='sold'?`<div class="card-badge sold">${t('sold')}</div>`:''}</div>
        <div class="card-body"><div class="card-price">${i.price.toLocaleString('ru')} ₸</div><div class="card-title">${i.title}</div></div>
      </div>`).join('')
    : `<div class="empty-state"><span class="empty-icon">🤍</span>${t('noFavs')}</div>`;
  document.getElementById('favModal').classList.add('open');
}

function openProduct(id) {
  const item = DB.getListing(id); if(!item) return;
  DB.incrementViews(id); currentProductId = id;
  const sellerName = item.sellerName || t('seller');
  const sellerLocation = item.sellerLocation || '';
  document.getElementById('pmImage').src = item.image||'https://via.placeholder.com/520x240?text=No+photo';
  document.getElementById('pmTitle').textContent = item.title;
  document.getElementById('pmPrice').textContent = item.price.toLocaleString('ru')+' ₸';
  document.getElementById('pmDesc').textContent = item.description||'';
  document.getElementById('pmSellerName').textContent = sellerName;
  document.getElementById('pmAvatar').src = `https://i.pravatar.cc/80?u=${item.userId}`;
  document.getElementById('pmLocation').textContent = sellerLocation + t('pickup');
  document.getElementById('pmVerifiedLabel').textContent = t('verified');
  document.getElementById('pmBuy').textContent = t('buy');
  document.getElementById('pmBuy').onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent(item.title+' — '+item.price+' ₸')}`, '_blank');
  document.getElementById('pmReserve').textContent = t('reserve');
  document.getElementById('pmReserve').onclick = () => { showToast('🔖 ' + item.title); closeModals(); };
  updateFavBtn(id);
  document.getElementById('productModal').classList.add('open');
  render();
}

function openCreateModal() {
  if (!Auth.isLoggedIn()) { showToast(t('mustLogin')); openLoginModal(); return; }
  document.getElementById('createModal').classList.add('open');
}
function createListing() {
  const title = document.getElementById('createTitle').value.trim();
  const price = parseInt(document.getElementById('createPrice').value);
  if (!title||!price) { showToast(t('fillFields')); return; }
  DB.addListing({ title, price, category: document.getElementById('createCat').value, description: document.getElementById('createDesc').value.trim(), image: document.getElementById('createImg').value.trim()||'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop' });
  closeModals(); render(); showToast(t('published'));
  ['createTitle','createPrice','createDesc','createImg'].forEach(id=>document.getElementById(id).value='');
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open')); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModals();}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});
function openMobileNav() { document.getElementById('mobileNav').classList.add('open'); }
function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }
function showToast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400); }

applyLang();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наследство</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <a href="index.html" class="logo">Наследство</a>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Поиск товаров..." oninput="handleSearch()">
  </div>

  <nav class="nav">
    <button class="nav-btn hide-tablet" onclick="openFilterModal()">🔔 Фильтр</button>
    <button class="nav-btn hide-tablet" onclick="openFavoritesModal()">
      ❤️ Избранное <span class="fav-badge" id="favCount">0</span>
    </button>
    <select class="lang-sel hide-tablet">
      <option>RU</option><option>ҚЗ</option><option>EN</option>
    </select>
    <a href="profile.html" class="cabinet-btn">👤 Мой кабинет</a>
    <button class="burger" onclick="openMobileNav()" aria-label="Меню">☰</button>
  </nav>
</header>

<!-- ===== MOBILE DRAWER ===== -->
<div class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-overlay" onclick="closeMobileNav()"></div>
  <div class="mobile-nav-panel">
    <div class="mobile-nav-header">
      <span>Меню</span>
      <button class="close-nav" onclick="closeMobileNav()">✕</button>
    </div>
    <input class="mobile-search" type="text" placeholder="Поиск..." oninput="handleSearchMobile(this.value)">
    <a href="profile.html" class="mobile-nav-item green">👤 Мой кабинет</a>
    <button class="mobile-nav-item" onclick="openFavoritesModal();closeMobileNav()">
      ❤️ Избранное <span class="fav-badge" id="favCountMobile">0</span>
    </button>
    <button class="mobile-nav-item" onclick="openFilterModal();closeMobileNav()">⚙️ Фильтр</button>
    <button class="mobile-nav-item sell-item" onclick="openCreateModal();closeMobileNav()">➕ Продать вещь</button>
    <div class="mn-lang-wrap">
      <label class="mn-lang-label">ЯЗЫК</label>
      <select class="lang-sel lang-sel-full">
        <option>RU — Русский</option><option>ҚЗ — Қазақша</option><option>EN — English</option>
      </select>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<main class="container">
  <h1 class="page-title">Все объявления</h1>

  <div class="categories-card">
    <button class="cat-btn active" data-cat="all"       onclick="filterCat(this,'all')"><span class="icon">🏠</span>Все</button>
    <button class="cat-btn"        data-cat="tech"      onclick="filterCat(this,'tech')"><span class="icon">🫖</span>Техника</button>
    <button class="cat-btn"        data-cat="books"     onclick="filterCat(this,'books')"><span class="icon">📚</span>Учебники</button>
    <button class="cat-btn"        data-cat="furniture" onclick="filterCat(this,'furniture')"><span class="icon">🛋️</span>Мебель</button>
    <button class="cat-btn sell"                        onclick="openCreateModal()"><span class="icon">➕</span>Продать</button>
  </div>

  <div class="listings-grid" id="listingsGrid"></div>
</main>

<!-- ===== PRODUCT MODAL ===== -->
<div class="modal-overlay" id="productModal">
  <div class="product-modal">
    <div style="position:relative;">
      <button onclick="closeModals()" class="pm-back-btn">←</button>
      <img id="pmImage" src="" class="pm-img" alt="">
    </div>
    <div class="pm-body">
      <div id="pmPrice" class="pm-price"></div>
      <div id="pmTitle" class="pm-title"></div>
      <div class="pm-seller">
        <img id="pmAvatar" src="" alt="">
        <div>
          <div id="pmSellerName" class="pm-seller-name"></div>
          <div class="pm-verified">
            <span class="pm-verified-dot">✓</span>
            Верифицирован через Stud.ID
          </div>
        </div>
      </div>
      <div class="pm-loc">📍 <span id="pmLocation"></span></div>
      <button class="btn-wa" id="pmWhatsapp">💬 Написать в WhatsApp</button>
      <button class="btn-res">Забронировать</button>
    </div>
  </div>
</div>

<!-- ===== CREATE MODAL ===== -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h2>➕ Новое объявление</h2>
    <label>Название</label>
    <input type="text" id="createTitle" placeholder="Название товара">
    <label>Цена (₸)</label>
    <input type="number" id="createPrice" placeholder="Например: 5000">
    <label>Категория</label>
    <select id="createCat">
      <option value="tech">🫖 Техника</option>
      <option value="books">📚 Учебники</option>
      <option value="furniture">🛋️ Мебель</option>
    </select>
    <label>Описание</label>
    <textarea id="createDesc" placeholder="Краткое описание..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">Отмена</button>
      <button class="btn-primary" onclick="createListing()">Опубликовать</button>
    </div>
  </div>
</div>

<!-- ===== FILTER MODAL ===== -->
<div class="modal-overlay" id="filterModal">
  <div class="modal" style="max-width:380px;">
    <h2>⚙️ Фильтр</h2>
    <label>Цена до (₸)</label>
    <input type="number" id="filterMax" placeholder="Максимальная цена">
    <label>Категория</label>
    <select id="filterCatSel">
      <option value="all">Все категории</option>
      <option value="tech">Техника</option>
      <option value="books">Учебники</option>
      <option value="furniture">Мебель</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="clearFilters()">Очистить</button>
      <button class="btn-primary" onclick="applyFilter()">Применить</button>
    </div>
  </div>
</div>

<!-- ===== FAVORITES MODAL ===== -->
<div class="modal-overlay" id="favModal">
  <div class="fav-modal">
    <div class="fav-modal-header">
      <h2>❤️ Избранное</h2>
      <button class="close-x" onclick="closeModals()">✕</button>
    </div>
    <div class="fav-modal-body">
      <div class="listings-grid fav-grid" id="favGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let favorites = JSON.parse(localStorage.getItem('nasledstvo_favs') || '[]');
  let activeFilter = { cat: 'all', maxPrice: null, search: '' };

  const listings = [
    { id:1, title:'Микроволновка Samsung', price:8500, cat:'tech', seller:'Ержан С.', location:'КазНУ, Общага №17', sold:false, views:204, likes:12, comments:12, img:'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?w=400&h=300&fit=crop' },
    { id:2, title:'Диван-кровать', price:6000, cat:'furniture', seller:'Алина М.', location:'КазНУ, Общага №3', sold:false, views:168, likes:7, comments:7, img:'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&h=300&fit=crop' },
    { id:3, title:'Письменный стол', price:3500, cat:'furniture', seller:'Данияр К.', location:'МУИТ, Общага №2', sold:true, views:98, likes:5, comments:5, img:'https://images.unsplash.com/photo-1593642632651-d3fba3ca8d1d?w=400&h=300&fit=crop' },
    { id:4, title:'Утюг Philips', price:4500, cat:'tech', seller:'Зарина Т.', location:'КазНУ, Общага №9', sold:true, views:143, likes:2, comments:2, img:'https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=400&h=300&fit=crop' },
    { id:5, title:'Учебник по матанализу', price:1200, cat:'books', seller:'Нурлан А.', location:'КазНУ, Общага №5', sold:false, views:77, likes:3, comments:1, img:'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=300&fit=crop' },
    { id:6, title:'Электрочайник Bosch', price:5500, cat:'tech', seller:'Сабина Р.', location:'КБТУ, Общага №1', sold:false, views:120, likes:9, comments:4, img:'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&h=300&fit=crop' },
  ];

  function getFiltered() {
    return listings.filter(i => {
      const c = activeFilter.cat === 'all' || i.cat === activeFilter.cat;
      const p = !activeFilter.maxPrice || i.price <= activeFilter.maxPrice;
      const s = !activeFilter.search || i.title.toLowerCase().includes(activeFilter.search.toLowerCase());
      return c && p && s;
    });
  }

  function cardHTML(item) {
    return `
      <div class="listing-card" onclick="openProduct(${item.id})">
        <div class="card-img-wrap">
          <img src="${item.img}" alt="${item.title}" class="card-img">
          ${item.sold ? '<div class="card-badge sold">Продано</div>' : ''}
          <button class="fav-btn" onclick="toggleFav(event,${item.id})">${favorites.includes(item.id) ? '❤️' : '🤍'}</button>
        </div>
        <div class="card-body">
          <div class="card-price">${item.price.toLocaleString('ru')} ₸</div>
          <div class="card-title">${item.title}</div>
          <div class="card-meta"><span>👁️ ${item.views}</span><span>❤️ ${item.likes}</span><span>💬 ${item.comments}</span></div>
          <div class="card-seller">
            <img src="https://i.pravatar.cc/60?u=${item.id}" class="card-avatar" alt="">
            <div>
              <div class="card-seller-name">${item.seller}</div>
              <div class="card-seller-loc">📍 ${item.location}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function render() {
    const data = getFiltered();
    document.getElementById('listingsGrid').innerHTML = data.length
      ? data.map(cardHTML).join('')
      : '<div class="empty-state"><span class="empty-icon">🔍</span>Ничего не найдено</div>';
    const n = favorites.length;
    document.getElementById('favCount').textContent = n;
    document.getElementById('favCountMobile').textContent = n;
  }

  function filterCat(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter.cat = cat;
    render();
  }

  function handleSearch() { activeFilter.search = document.getElementById('searchInput').value; render(); }
  function handleSearchMobile(v) { activeFilter.search = v; render(); }

  function openFilterModal() { document.getElementById('filterModal').classList.add('open'); }
  function applyFilter() {
    activeFilter.maxPrice = document.getElementById('filterMax').value ? parseInt(document.getElementById('filterMax').value) : null;
    activeFilter.cat = document.getElementById('filterCatSel').value;
    closeModals(); render(); showToast('✅ Фильтр применён');
  }
  function clearFilters() {
    activeFilter = { cat: 'all', maxPrice: null, search: '' };
    document.getElementById('filterMax').value = '';
    document.getElementById('filterCatSel').value = 'all';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
    closeModals(); render(); showToast('🧹 Фильтр сброшен');
  }

  function toggleFav(e, id) {
    e.stopPropagation();
    favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
    localStorage.setItem('nasledstvo_favs', JSON.stringify(favorites));
    showToast(favorites.includes(id) ? '❤️ Добавлено в избранное' : 'Удалено из избранного');
    render();
  }

  function openFavoritesModal() {
    const items = listings.filter(l => favorites.includes(l.id));
    document.getElementById('favGrid').innerHTML = items.length
      ? items.map(i => `
          <div class="listing-card" onclick="openProduct(${i.id});closeModals();">
            <div class="card-img-wrap">
              <img src="${i.img}" class="card-img" alt="">
              ${i.sold ? '<div class="card-badge sold">Продано</div>' : ''}
            </div>
            <div class="card-body">
              <div class="card-price">${i.price.toLocaleString('ru')} ₸</div>
              <div class="card-title">${i.title}</div>
            </div>
          </div>`).join('')
      : '<div class="empty-state"><span class="empty-icon">🤍</span>Избранных нет</div>';
    document.getElementById('favModal').classList.add('open');
  }

  function openProduct(id) {
    const item = listings.find(l => l.id === id);
    if (!item) return;
    document.getElementById('pmImage').src = item.img;
    document.getElementById('pmTitle').textContent = item.title;
    document.getElementById('pmPrice').textContent = item.price.toLocaleString('ru') + ' ₸';
    document.getElementById('pmSellerName').textContent = item.seller;
    document.getElementById('pmAvatar').src = `https://i.pravatar.cc/80?u=${item.id}`;
    document.getElementById('pmLocation').textContent = item.location + ', самовывоз до 22:00';
    document.getElementById('pmWhatsapp').onclick = () =>
      window.open(`https://wa.me/?text=Интересует: ${item.title} за ${item.price} ₸`, '_blank');
    document.getElementById('productModal').classList.add('open');
  }

  function openCreateModal() { document.getElementById('createModal').classList.add('open'); }
  function createListing() {
    const title = document.getElementById('createTitle').value.trim();
    const price = parseInt(document.getElementById('createPrice').value);
    if (!title || !price) { showToast('⚠️ Заполните название и цену'); return; }
    listings.unshift({
      id: Date.now(), title, price,
      cat: document.getElementById('createCat').value,
      seller: 'Вы', location: 'КазНУ, Общага №17',
      sold: false, views: 0, likes: 0, comments: 0,
      img: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop'
    });
    closeModals(); render(); showToast('✅ Опубликовано!');
    ['createTitle', 'createPrice', 'createDesc'].forEach(id => document.getElementById(id).value = '');
  }

  function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }
  document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) closeModals(); }));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });

  function openMobileNav()  { document.getElementById('mobileNav').classList.add('open'); }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ панель — Наследство</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>
  <script src="db.js"></script>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Наследство</a>
  <nav class="nav">
    <a href="index.html" class="cabinet-btn">🏠 На главную</a>
    <a href="profile.html" class="cabinet-btn">👤 Кабинет</a>
  </nav>
</header>

<div class="container" style="max-width:1000px;">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <h1 style="font-size:24px;font-weight:700;">🛡️ Админ панель</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button onclick="showTab('users')" class="tab-switch active" id="tabUsers">👥 Пайдаланушылар</button>
      <button onclick="showTab('listings')" class="tab-switch" id="tabListings">📦 Объявления</button>
    </div>
  </div>

  <!-- USERS TAB -->
  <div id="panelUsers">
    <div class="admin-card">
      <div class="admin-card-header">
        <span id="usersCount"></span>
        <input type="text" id="userSearch" placeholder="🔍 Іздеу..." oninput="renderUsers()" style="padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:14px;outline:none;width:220px;">
      </div>
      <div style="overflow-x:auto;">
        <table class="admin-table" id="usersTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Аты</th>
              <th>Email</th>
              <th>Орналасуы</th>
              <th>Рейтинг</th>
              <th>Объявления</th>
              <th>Әрекет</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- LISTINGS TAB -->
  <div id="panelListings" style="display:none;">
    <div class="admin-card">
      <div class="admin-card-header">
        <span id="listingsCount"></span>
        <input type="text" id="listingSearch" placeholder="🔍 Іздеу..." oninput="renderListings()" style="padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:14px;outline:none;width:220px;">
      </div>
      <div style="overflow-x:auto;">
        <table class="admin-table" id="listingsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Сурет</th>
              <th>Атауы</th>
              <th>Баға</th>
              <th>Санат</th>
              <th>Сатушы</th>
              <th>Күйі</th>
              <th>Көрулер</th>
              <th>Әрекет</th>
            </tr>
          </thead>
          <tbody id="listingsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- DELETE USER MODAL -->
<div class="modal-overlay" id="deleteUserModal">
  <div class="confirm-modal">
    <span class="icon">🗑️</span>
    <h2>Пайдаланушыны жою?</h2>
    <p id="deleteUserText"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn-cancel" onclick="closeModals()">Болдырмау</button>
      <button class="btn-del" onclick="confirmDeleteUser()">Жою</button>
    </div>
  </div>
</div>

<!-- DELETE LISTING MODAL -->
<div class="modal-overlay" id="deleteListingModal">
  <div class="confirm-modal">
    <span class="icon">🗑️</span>
    <h2>Объявлениені жою?</h2>
    <p id="deleteListingText"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn-cancel" onclick="closeModals()">Болдырмау</button>
      <button class="btn-del" onclick="confirmDeleteListing()">Жою</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<style>
  .tab-switch {
    padding: 9px 18px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    background: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: #6b7280;
    transition: all 0.15s;
  }
  .tab-switch:hover { background: #f3f4f6; }
  .tab-switch.active { background: #2d7e32; color: white; border-color: #2d7e32; }

  .admin-card {
    background: white;
    border-radius: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  .admin-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid #f3f4f6;
    flex-wrap: wrap;
    gap: 10px;
  }
  .admin-card-header span {
    font-size: 15px;
    font-weight: 600;
    color: #374151;
  }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .admin-table th {
    background: #f9fafb;
    padding: 12px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid #f3f4f6;
    white-space: nowrap;
  }
  .admin-table td {
    padding: 14px 16px;
    border-bottom: 1px solid #f9fafb;
    color: #1f2937;
    vertical-align: middle;
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: #fafafa; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-active  { background: #e8f5e9; color: #2d7e32; }
  .badge-sold    { background: #fef2f2; color: #e53935; }
  .badge-archived{ background: #f1f5f9; color: #64748b; }

  .user-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  .listing-thumb {
    width: 48px; height: 48px;
    border-radius: 8px;
    object-fit: cover;
    display: block;
  }
  .action-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .action-btn:hover { opacity: 0.8; }
  .btn-danger { background: #fef2f2; color: #e53935; }

  .stat-row {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: white;
    border-radius: 12px;
    padding: 18px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    flex: 1;
    min-width: 140px;
  }
  .stat-box .stat-num { font-size: 28px; font-weight: 700; color: #2d7e32; }
  .stat-box .stat-label { font-size: 12px; color: #9ca3af; margin-top: 2px; }

  .empty-row td { text-align: center; padding: 40px; color: #aaa; }

  @media (max-width: 640px) {
    .admin-table th, .admin-table td { padding: 10px 12px; }
  }
</style>

<script>
// ── Тек админ кіре алады ──────────────────────────────────────
const ADMIN_EMAIL = 'admin@nasledstvo.kz'; // ← өз email-іңізді жазыңыз

function checkAdmin() {
  const user = Auth.currentUser();
  if (!user) { window.location.href = 'login.html'; return false; }
  if (user.email !== ADMIN_EMAIL) {
    document.querySelector('.container').innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <div style="font-size:64px;margin-bottom:16px;">🔒</div>
        <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Рұқсат жоқ</h2>
        <p style="color:#888;margin-bottom:24px;">Бұл бет тек админдерге арналған.</p>
        <a href="index.html" class="cabinet-btn">🏠 Басты бетке</a>
      </div>`;
    return false;
  }
  return true;
}

// ── Вспомогательные ───────────────────────────────────────────
function getUsers() {
  try { return JSON.parse(localStorage.getItem('users')) ?? []; } catch { return []; }
}
function getListings() {
  try { return JSON.parse(localStorage.getItem('listings')) ?? []; } catch { return []; }
}
function getUserListingsCount(userId) {
  return getListings().filter(l => l.userId === userId).length;
}

// ── Вкладки ───────────────────────────────────────────────────
function showTab(name) {
  document.getElementById('panelUsers').style.display    = name === 'users'    ? 'block' : 'none';
  document.getElementById('panelListings').style.display = name === 'listings' ? 'block' : 'none';
  document.getElementById('tabUsers').classList.toggle('active',    name === 'users');
  document.getElementById('tabListings').classList.toggle('active', name === 'listings');
}

// ── Пайдаланушылар тізімі ─────────────────────────────────────
function renderUsers() {
  const users = getUsers();
  const q = document.getElementById('userSearch').value.toLowerCase();
  const filtered = users.filter(u =>
    u.name?.toLowerCase().includes(q) ||
    u.email?.toLowerCase().includes(q) ||
    u.location?.toLowerCase().includes(q)
  );
  document.getElementById('usersCount').textContent = `👥 Барлығы: ${users.length} пайдаланушы`;
  const tbody = document.getElementById('usersBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Пайдаланушы табылмады</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map((u, i) => `
    <tr>
      <td style="color:#9ca3af;font-size:12px;">${i + 1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <img src="https://i.pravatar.cc/36?u=${u.id}" class="user-avatar" alt="">
          <div>
            <div style="font-weight:600;">${u.name || '—'}</div>
          </div>
        </div>
      </td>
      <td style="color:#6b7280;">${u.email || '—'}</td>
      <td style="color:#6b7280;">${u.location || '—'}</td>
      <td>⭐ ${(u.rating || 5.0).toFixed(1)}</td>
      <td>
        <span style="font-weight:600;">${getUserListingsCount(u.id)}</span>
      </td>
      <td>
        <button class="action-btn btn-danger" onclick="openDeleteUser(${u.id}, '${(u.name||'').replace(/'/g,"\\'")}')">🗑️ Жою</button>
      </td>
    </tr>
  `).join('');
}

// ── Объявления тізімі ─────────────────────────────────────────
function renderListings() {
  const listings = getListings();
  const q = document.getElementById('listingSearch').value.toLowerCase();
  const filtered = listings.filter(l =>
    l.title?.toLowerCase().includes(q) ||
    l.sellerName?.toLowerCase().includes(q)
  );
  document.getElementById('listingsCount').textContent = `📦 Барлығы: ${listings.length} объявление`;
  const tbody = document.getElementById('listingsBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="9">Объявление табылмады</td></tr>`;
    return;
  }
  const catNames = { tech: '🫖 Техника', books: '📚 Учебники', furniture: '🛋️ Мебель' };
  tbody.innerHTML = filtered.map((l, i) => `
    <tr>
      <td style="color:#9ca3af;font-size:12px;">${i + 1}</td>
      <td>
        <img src="${l.image || 'https://via.placeholder.com/48?text=?'}" class="listing-thumb"
          onerror="this.src='https://via.placeholder.com/48?text=?'" alt="">
      </td>
      <td style="font-weight:600;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.title || '—'}</td>
      <td style="color:#2d7e32;font-weight:700;">${(l.price||0).toLocaleString('ru')} ₸</td>
      <td>${catNames[l.category] || l.category || '—'}</td>
      <td style="color:#6b7280;">${l.sellerName || '—'}</td>
      <td>
        <span class="badge badge-${l.status || 'active'}">
          ${{active:'Белсенді', sold:'Сатылды', archived:'Мұрағат'}[l.status] || l.status}
        </span>
      </td>
      <td style="color:#6b7280;">👁️ ${l.views || 0}</td>
      <td>
        <button class="action-btn btn-danger" onclick="openDeleteListing(${l.id}, '${(l.title||'').replace(/'/g,"\\'")}')">🗑️ Жою</button>
      </td>
    </tr>
  `).join('');
}

// ── Жою: пайдаланушы ──────────────────────────────────────────
let targetUserId = null;
function openDeleteUser(id, name) {
  targetUserId = id;
  document.getElementById('deleteUserText').textContent = name;
  document.getElementById('deleteUserModal').classList.add('open');
}
function confirmDeleteUser() {
  const users = getUsers().filter(u => u.id !== targetUserId);
  localStorage.setItem('users', JSON.stringify(users));
  // Сессияда сол пайдаланушы болса — шығарамыз
  const cur = Auth.currentUser();
  if (cur && cur.id === targetUserId) Auth.logout();
  closeModals();
  showToast('🗑️ Пайдаланушы жойылды');
  renderUsers();
}

// ── Жою: объявление ───────────────────────────────────────────
let targetListingId = null;
function openDeleteListing(id, title) {
  targetListingId = id;
  document.getElementById('deleteListingText').textContent = title;
  document.getElementById('deleteListingModal').classList.add('open');
}
function confirmDeleteListing() {
  DB.deleteListing(targetListingId);
  closeModals();
  showToast('🗑️ Объявление жойылды');
  renderListings();
}

// ── Утилиты ───────────────────────────────────────────────────
function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) closeModals(); }));
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2400); }

// ── Жүктеу ────────────────────────────────────────────────────
DB.init();
if (checkAdmin()) {
  renderUsers();
  renderListings();
}
</script>
</body>
</html>

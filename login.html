<body class="login-page">

<a href="index.html" class="logo-link">Наследство</a>

<div class="lang-row">
  <button class="lang-pill" onclick="switchLang('RU')" id="pillRU">RU</button>
  <button class="lang-pill" onclick="switchLang('KZ')" id="pillKZ">ҚЗ</button>
  <button class="lang-pill" onclick="switchLang('EN')" id="pillEN">EN</button>
</div>

<div class="login-card">

  <!-- ⚠️ Supabase setup notice -->
  <div class="setup-info" id="setupInfo">
    <strong>⚙️ Настройка Supabase</strong>
    Замените в коде ниже:<br>
    <code>YOUR_SUPABASE_URL</code> и <code>YOUR_SUPABASE_ANON_KEY</code><br>
    на ваши данные из <a href="https://supabase.com/dashboard" target="_blank" style="color:#92400e">supabase.com/dashboard</a> → Settings → API
  </div>

  <div class="tabs-login">
    <button class="tab-btn active" onclick="showTab('login')" id="tabLogin"></button>
    <button class="tab-btn" onclick="showTab('register')" id="tabRegister"></button>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div class="form-group">
      <label id="lblLoginEmail"></label>
      <input type="email" id="loginEmail" autocomplete="email">
      <div class="field-error" id="errLoginEmail"></div>
    </div>
    <div class="form-group">
      <label id="lblLoginPassword"></label>
      <input type="password" id="loginPassword" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="field-error" id="errLoginPassword"></div>
    </div>
    <button class="submit-btn" id="btnLogin" onclick="doLogin()">
      <span class="btn-text" id="btnLoginText"></span>
      <div class="spinner"></div>
    </button>
    <p class="login-hint" id="hintLogin"></p>
  </div>

  <!-- REGISTER -->
  <div id="formRegister" style="display:none;">
    <div class="form-group">
      <label id="lblRegName"></label>
      <input type="text" id="regName" autocomplete="name">
      <div class="field-error" id="errRegName"></div>
    </div>
    <div class="form-group">
      <label id="lblRegEmail"></label>
      <input type="email" id="regEmail" autocomplete="email">
      <div class="field-error" id="errRegEmail"></div>
    </div>
    <div class="form-group">
      <label id="lblRegPassword"></label>
      <input type="password" id="regPassword" autocomplete="new-password">
      <div class="field-error" id="errRegPassword"></div>
    </div>
    <div class="form-group">
      <label id="lblRegConfirm"></label>
      <input type="password" id="regConfirm" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      <div class="field-error" id="errRegConfirm"></div>
    </div>
    <button class="submit-btn" id="btnRegister" onclick="doRegister()">
      <span class="btn-text" id="btnRegisterText"></span>
      <div class="spinner"></div>
    </button>
    <p class="login-hint" id="hintRegister"></p>
  </div>

</div>

<script>
// ══════════════════════════════════════════

// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://jcoailghownjknqtemmo.supabase.co';   // например: https://xxxx.supabase.co
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impjb2FpbGdob3duamtucXRlbW1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5ODUxMTcsImV4cCI6MjA5MTU2MTExN30.SCWsfIn3UI2917nrXsLSf5Um8wljrkQlsJbpj4ayFrI'; // ваш anon/public key

// ══════════════════════════════════════════
// ПЕРЕВОДЫ
// ══════════════════════════════════════════
const LANG = {

  },
  EN: {
    tabLogin: 'Log in',
    tabRegister: 'Register',
    email: 'Email',
    password: 'Password',
    name: 'Name',
    confirmPassword: 'Confirm password',
    btnLogin: 'Log in',
    btnRegister: 'Create account',
    hintLogin: "Don't have an account? Sign up.",
    hintRegister: 'Already have an account? Log in.',
    errEmailRequired: 'Enter your email',
    errEmailInvalid: 'Invalid email address',
    errPasswordRequired: 'Enter your password',
    errPasswordShort: 'At least 6 characters',
    errNameRequired: 'Enter your name',
    errConfirmRequired: 'Confirm your password',
    errPasswordMismatch: 'Passwords do not match',
    errInvalidCredentials: 'Incorrect email or password',
    errEmailTaken: 'This email is already registered',
    errNetwork: 'Network error. Check your connection.',
    errSupabaseNotConfigured: '⚙️ Supabase is not configured. Replace YOUR_SUPABASE_URL and YOUR_SUPABASE_ANON_KEY in the code.',
    successRegister: '✅ Account created! Check your email to confirm.',
    successLogin: '✅ Logged in! Redirecting...',
  }

let currentLang = localStorage.getItem('lang') || 'RU';
function t(key) { return (LANG[currentLang] || LANG.RU)[key] || key; }

function applyLang() {
  document.getElementById('tabLogin').textContent     = t('tabLogin');
  document.getElementById('tabRegister').textContent  = t('tabRegister');
  document.getElementById('lblLoginEmail').textContent    = t('email');
  document.getElementById('lblLoginPassword').textContent = t('password');
  document.getElementById('btnLoginText').textContent     = t('btnLogin');
  document.getElementById('hintLogin').textContent        = t('hintLogin');
  document.getElementById('lblRegName').textContent       = t('name');
  document.getElementById('lblRegEmail').textContent      = t('email');
  document.getElementById('lblRegPassword').textContent   = t('password');
  document.getElementById('lblRegConfirm').textContent    = t('confirmPassword');
  document.getElementById('btnRegisterText').textContent  = t('btnRegister');
  document.getElementById('hintRegister').textContent     = t('hintRegister');
  ['pillRU','pillKZ','pillEN'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === 'pill' + currentLang);
  });
}

function switchLang(val) {
  currentLang = val;
  localStorage.setItem('lang', val);
  applyLang();
  clearAlert();
  clearErrors();
}

// ══════════════════════════════════════════
// SUPABASE CLIENT (без npm, через CDN)
// ══════════════════════════════════════════
let supabase = null;

function initSupabase() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL' || SUPABASE_KEY === 'YOUR_SUPABASE_ANON_KEY') {
    return false;
  }
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  } catch(e) {
    return false;
  }
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function showTab(name) {
  document.getElementById('formLogin').style.display    = name === 'login'    ? 'block' : 'none';
  document.getElementById('formRegister').style.display = name === 'register' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active',    name === 'login');
  document.getElementById('tabRegister').classList.toggle('active', name === 'register');
  clearAlert(); clearErrors();
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert alert-${type} show`;
}
function clearAlert() {
  const el = document.getElementById('alertBox');
  el.className = 'alert';
  el.textContent = '';
}

function showFieldError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}
function clearErrors() {
  document.querySelectorAll('.field-error').forEach(e => { e.classList.remove('show'); e.textContent = ''; });
  document.querySelectorAll('input').forEach(e => e.classList.remove('error'));
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

function fieldError(inputId, errId, msg) {
  document.getElementById(inputId).classList.add('error');
  showFieldError(errId, msg);
}

// ══════════════════════════════════════════
// VALIDATION
// ══════════════════════════════════════════
function validateEmail(v) {
  if (!v) return t('errEmailRequired');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return t('errEmailInvalid');
  return null;
}
function validatePassword(v) {
  if (!v) return t('errPasswordRequired');
  if (v.length < 6) return t('errPasswordShort');
  return null;
}

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
async function doLogin() {
  clearAlert(); clearErrors();

  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  let hasError   = false;

  const emailErr = validateEmail(email);
  if (emailErr) { fieldError('loginEmail', 'errLoginEmail', emailErr); hasError = true; }
  const passErr = validatePassword(password);
  if (passErr)  { fieldError('loginPassword', 'errLoginPassword', passErr); hasError = true; }
  if (hasError) return;

  if (!initSupabase()) {
    showAlert(t('errSupabaseNotConfigured'));
    return;
  }

  setLoading('btnLogin', true);
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      if (error.message.includes('Invalid login')) showAlert(t('errInvalidCredentials'));
      else showAlert(error.message);
      return;
    }
    // Сохраняем пользователя
    const user = data.user;
    localStorage.setItem('current_user', JSON.stringify({
      id: user.id,
      email: user.email,
      name: user.user_metadata?.name || email.split('@')[0],
      location: user.user_metadata?.location || '',
      avatar: null, rating: 5.0, reviews: 0, verified: false,
    }));
    showAlert(t('successLogin'), 'success');
    setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
  } catch(e) {
    showAlert(t('errNetwork'));
  } finally {
    setLoading('btnLogin', false);
  }
}

// ══════════════════════════════════════════
// REGISTER
// ══════════════════════════════════════════
async function doRegister() {
  clearAlert(); clearErrors();

  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm  = document.getElementById('regConfirm').value;
  let hasError   = false;

  if (!name)    { fieldError('regName', 'errRegName', t('errNameRequired')); hasError = true; }
  const emailErr = validateEmail(email);
  if (emailErr) { fieldError('regEmail', 'errRegEmail', emailErr); hasError = true; }
  const passErr = validatePassword(password);
  if (passErr)  { fieldError('regPassword', 'errRegPassword', passErr); hasError = true; }
  if (!confirm) { fieldError('regConfirm', 'errRegConfirm', t('errConfirmRequired')); hasError = true; }
  else if (password !== confirm) { fieldError('regConfirm', 'errRegConfirm', t('errPasswordMismatch')); hasError = true; }
  if (hasError) return;

  if (!initSupabase()) {
    showAlert(t('errSupabaseNotConfigured'));
    return;
  }

  setLoading('btnRegister', true);
  try {
    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { name, location: '' } }
    });
    if (error) {
      if (error.message.includes('already registered') || error.message.includes('already been registered')) {
        showAlert(t('errEmailTaken'));
      } else {
        showAlert(error.message);
      }
      return;
    }
    showAlert(t('successRegister'), 'success');
    // Если email confirmation отключён в Supabase — сразу редирект
    if (data.session) {
      const user = data.user;
      localStorage.setItem('current_user', JSON.stringify({
        id: user.id, email: user.email, name,
        location: '', avatar: null, rating: 5.0, reviews: 0, verified: false,
      }));
      setTimeout(() => { window.location.href = 'profile.html'; }, 1200);
    }
  } catch(e) {
    showAlert(t('errNetwork'));
  } finally {
    setLoading('btnRegister', false);
  }
}

applyLang();
</script>

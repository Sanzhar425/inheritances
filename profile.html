<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Наследство</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Наследство</a>
  <div class="search-wrap"><input type="text" id="profileSearch" placeholder=""></div>
  <nav class="nav">
    <button class="nav-btn hide-tablet" onclick="openMsgModal()" id="btnMessages"></button>
    <select class="lang-sel hide-tablet" onchange="switchLang(this.value)" id="langSelDesktop">
      <option value="RU">RU</option>
      <option value="KZ">ҚЗ</option>
      <option value="EN">EN</option>
    </select>
    <a href="index.html" class="cabinet-btn" id="btnHome"></a>
    <button class="burger" onclick="openMN()">☰</button>
  </nav>
</header>

<div class="mobile-nav" id="mobileNav">
  <div class="mn-overlay" onclick="closeMN()"></div>
  <div class="mn-panel">
    <div class="mn-head"><span id="mnMenuLabel"></span><button class="close-nav" onclick="closeMN()">✕</button></div>
    <a href="index.html" class="mn-item" id="mnHome"></a>
    <button class="mn-item active-page" id="mnCabinet"></button>
    <button class="mn-item" onclick="openMsgModal();closeMN()" id="mnMessages"></button>
    <button class="mn-item" onclick="openCreateModal();closeMN()" style="background:#fff8f0;color:#e65100;" id="mnAddListing"></button>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee;">
      <label style="font-size:12px;color:#999;display:block;margin-bottom:6px;" id="mnLangLabel"></label>
      <select class="lang-sel" onchange="switchLang(this.value)" id="langSelMobile" style="width:100%;">
        <option value="RU">RU — Русский</option>
        <option value="KZ">ҚЗ — Қазақша</option>
        <option value="EN">EN — English</option>
      </select>
    </div>
  </div>
</div>

<div class="page-wrap">
  <aside class="sidebar">
    <div class="profile-card" id="profileCard"></div>
    <div class="add-section">
      <div class="add-icon">➕</div>
      <div class="add-title" id="addSectionTitle"></div>
      <button class="add-new-btn" onclick="openCreateModal()" id="btnAddNew"></button>
      <div class="add-info" id="addSectionInfo"></div>
    </div>
  </aside>

  <div class="content">
    <h1 class="content-title" id="contentTitle"></h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(event,'listings')" id="tabListings"></button>
      <button class="tab" onclick="switchTab(event,'messages')" id="tabMessages"></button>
      <button class="tab" onclick="switchTab(event,'favorites')" id="tabFavorites"></button>
    </div>
    <div id="tab-listings"></div>
    <div id="tab-messages" style="display:none;"></div>
    <div id="tab-favorites" style="display:none;"></div>
  </div>
</div>

<!-- EDIT PROFILE -->
<div class="modal-overlay" id="editProfileModal">
  <div class="modal">
    <h2 id="editProfileTitle"></h2>
    <label id="lblEpName"></label><input type="text" id="epName">
    <label id="lblEpEmail"></label><input type="email" id="epEmail">
    <label id="lblEpLocation"></label><input type="text" id="epLocation">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()" id="btnEpCancel"></button>
      <button class="btn-save" onclick="saveProfile()" id="btnEpSave"></button>
    </div>
  </div>
</div>

<!-- EDIT LISTING -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editListingTitle"></h2>
    <label id="lblEditName"></label><input type="text" id="editTitle">
    <label id="lblEditPrice"></label><input type="text" id="editPrice">
    <label id="lblEditDesc"></label><textarea id="editDesc"></textarea>
    <label id="lblEditStatus"></label>
    <select id="editStatus">
      <option value="active" id="optActive"></option>
      <option value="sold" id="optSold"></option>
      <option value="archived" id="optArchived"></option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()" id="btnEditCancel"></button>
      <button class="btn-save" onclick="saveListing()" id="btnEditSave"></button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div class="modal-overlay" id="deleteModal">
  <div class="confirm-modal">
    <span class="icon">🗑️</span>
    <h2 id="deleteTitle"></h2>
    <p id="deleteText"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn-cancel" onclick="closeModals()" id="btnDeleteCancel"></button>
      <button class="btn-del" onclick="confirmDelete()" id="btnDeleteConfirm"></button>
    </div>
  </div>
</div>

<!-- CREATE -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h2 id="createModalTitle"></h2>
    <label id="lblCreateName"></label><input type="text" id="createTitle">
    <label id="lblCreatePrice"></label><input type="number" id="createPrice">
    <label id="lblCreateCat"></label>
    <select id="createCat">
      <option value="tech" id="optTech"></option>
      <option value="books" id="optBooks"></option>
      <option value="furniture" id="optFurniture"></option>
    </select>
    <label id="lblCreateDesc"></label><textarea id="createDesc"></textarea>
    <label id="lblCreatePhoto"></label><input type="text" id="createImg" placeholder="https://...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()" id="btnCreateCancel"></button>
      <button class="btn-primary" onclick="createListing()" id="btnPublish"></button>
    </div>
  </div>
</div>

<!-- MESSAGES MODAL -->
<div class="modal-overlay" id="msgModal">
  <div class="fav-modal">
    <div class="fav-modal-header"><h2 id="msgModalTitle"></h2><button class="close-x" onclick="closeModals()">✕</button></div>
    <div class="fav-modal-body" id="msgList"></div>
  </div>
</div>

  applyLang();

const DB = {
  _get(k) { try { return JSON.parse(localStorage.getItem(k)) ?? null; } catch { return null; } },
  _set(k,v) { localStorage.setItem(k, JSON.stringify(v)); },
  _id() { return Date.now() + Math.floor(Math.random() * 1000); },
  init() {
    if (this._get('db_v2')) return;
    const userId = this._id(); const now = Date.now();
    this._set('current_user', { id: userId, name: 'Ержан С.', email: 'erzhan@test.kz', location: 'КазНУ, Общежитие №17', avatar: null, rating: 5.0, reviews: 12, verified: true });
    this._set('listings', [
      { id: this._id(), userId, title: 'Микроволновка Samsung', price: 8500, category: 'tech', description: 'В отличном состоянии', image: 'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?w=400&h=300&fit=crop', status: 'active', views: 204, createdAt: now - 86400000*5 },
      { id: this._id(), userId, title: 'Диван-кровать', price: 6000, category: 'furniture', description: 'Удобный, раскладывается', image: 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&h=300&fit=crop', status: 'active', views: 168, createdAt: now - 86400000*4 },
      { id: this._id(), userId, title: 'Письменный стол', price: 3500, category: 'furniture', description: 'Деревянный, без дефектов', image: 'https://images.unsplash.com/photo-1593642632651-d3fba3ca8d1d?w=400&h=300&fit=crop', status: 'sold', views: 98, createdAt: now - 86400000*3 },
      { id: this._id(), userId, title: 'Утюг Philips', price: 4500, category: 'tech', description: 'Паровой, почти новый', image: 'https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=400&h=300&fit=crop', status: 'sold', views: 143, createdAt: now - 86400000*2 },
      { id: this._id(), userId, title: 'Учебник по матанализу', price: 1200, category: 'books', description: '2-е издание', image: 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=300&fit=crop', status: 'active', views: 77, createdAt: now - 86400000 },
      { id: this._id(), userId, title: 'Электрочайник Bosch', price: 5500, category: 'tech', description: '1.7 л, быстрый нагрев', image: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=400&h=300&fit=crop', status: 'active', views: 120, createdAt: now },
    ]);
    this._set('favorites', []); this._set('messages', []); this._set('db_v2', true);
  },
  getUser() { return this._get('current_user'); },
  saveUser(d) { const u={...this.getUser(),...d}; this._set('current_user',u); return u; },
  getListings(f={}) { let l=this._get('listings')??[]; if(f.status&&f.status!=='all')l=l.filter(x=>x.status===f.status); return l.sort((a,b)=>b.createdAt-a.createdAt); },
  getListing(id) { return (this._get('listings')??[]).find(l=>l.id===id)??null; },
  addListing(d) { const l=this._get('listings')??[]; const item={id:this._id(),userId:this.getUser()?.id,views:0,status:'active',createdAt:Date.now(),...d}; l.unshift(item); this._set('listings',l); return item; },
  updateListing(id,d) { const l=this._get('listings')??[]; const i=l.findIndex(x=>x.id===id); if(i===-1)return null; l[i]={...l[i],...d}; this._set('listings',l); return l[i]; },
  deleteListing(id) { this._set('listings',(this._get('listings')??[]).filter(l=>l.id!==id)); this._set('favorites',(this._get('favorites')??[]).filter(f=>f!==id)); },
  getFavoriteListings() { const f=this._get('favorites')??[]; return (this._get('listings')??[]).filter(l=>f.includes(l.id)); },
  getMessages() { return this._get('messages')??[]; },
  markRead(id) { this._set('messages',this.getMessages().map(m=>m.id===id?{...m,read:true}:m)); },
  unreadCount() { return this.getMessages().filter(m=>!m.read).length; },
  getCategoryName(id) {
    const map = { tech: 'tech', books: 'books', furniture: 'furniture' };
    return t(map[id]) || id;
  },
};

DB.init();
let currentListingId = null;

function renderProfile() {
  const u = DB.getUser(); if (!u) return;
  document.getElementById('profileCard').innerHTML = `
    <img src="${u.avatar||`https://i.pravatar.cc/120?u=${u.id}`}" alt="avatar" class="profile-avatar">
    <div class="profile-name">${u.name}</div>
    <div class="profile-loc">📍 ${u.location||'—'}</div>
    <div class="profile-rating">⭐ ${u.rating.toFixed(1)} <span>(${u.reviews} ${t('reviews')})</span></div>
    <button class="edit-profile-btn" onclick="openEditProfile()">${t('editProfile')}</button>`;
}

function openEditProfile() {
  const u = DB.getUser();
  document.getElementById('epName').value = u.name||'';
  document.getElementById('epEmail').value = u.email||'';
  document.getElementById('epLocation').value = u.location||'';
  document.getElementById('editProfileModal').classList.add('open');
}
function saveProfile() {
  const name = document.getElementById('epName').value.trim();
  if (!name) { showToast(t('nameRequired')); return; }
  DB.saveUser({ name, email: document.getElementById('epEmail').value.trim(), location: document.getElementById('epLocation').value.trim() });
  closeModals(); renderProfile(); showToast(t('profileSaved'));
}

function switchTab(e, name) {
  ['listings','messages','favorites'].forEach(tab => {
    document.getElementById('tab-'+tab).style.display = tab===name?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(tab=>tab.classList.remove('active'));
  e.target.classList.add('active');
  if (name==='listings')  renderListings();
  if (name==='messages')  renderMessages();
  if (name==='favorites') renderFavorites();
}

function renderListings() {
  const myId = DB.getUser()?.id;
  const all = DB.getListings({status:'all'}).filter(l=>l.userId===myId);
  const el = document.getElementById('tab-listings');
  if (!all.length) {
    el.innerHTML=`<div class="tab-empty">${t('noListings').replace('\n','<br>')}</div>`;
    return;
  }
  el.innerHTML = all.map(item=>`
    <div class="listing-item" id="li-${item.id}">
      <div class="listing-img-wrap">
        <img src="${item.image||'https://via.placeholder.com/200x200?text=No+photo'}" alt="" class="listing-img" onerror="this.src='https://via.placeholder.com/200x200?text=No+photo'">
        ${item.status==='sold'?`<div class="listing-badge">${t('sold')}</div>`:''}
        ${item.status==='archived'?`<div class="listing-badge" style="background:#94a3b8">${t('archived')}</div>`:''}
      </div>
      <div class="listing-info">
        <div>
          <div class="listing-title">${item.title}</div>
          <div class="listing-price">${item.price.toLocaleString('ru')} ₸</div>
          <div class="listing-meta">
            <span>👁️ ${item.views}</span>
            <span>📦 ${DB.getCategoryName(item.category)}</span>
            <span>📅 ${new Date(item.createdAt).toLocaleDateString('ru')}</span>
          </div>
        </div>
        <div class="listing-actions">
          <button class="edit-btn" onclick="openEdit(${item.id})">${t('editBtn')}</button>
          <button class="delete-btn" onclick="openDelete(${item.id},'${item.title.replace(/'/g,"\\'")}')">${t('deleteItemBtn')}</button>
        </div>
      </div>
    </div>`).join('');
}

function openEdit(id) {
  const item = DB.getListing(id); if (!item) return;
  currentListingId = id;
  document.getElementById('editTitle').value = item.title;
  document.getElementById('editPrice').value = item.price;
  document.getElementById('editDesc').value = item.description||'';
  document.getElementById('editStatus').value = item.status;
  document.getElementById('editModal').classList.add('open');
}
function saveListing() {
  const title = document.getElementById('editTitle').value.trim();
  const price = parseInt(document.getElementById('editPrice').value);
  if (!title||!price) { showToast(t('fillFields')); return; }
  DB.updateListing(currentListingId, { title, price, description: document.getElementById('editDesc').value.trim(), status: document.getElementById('editStatus').value });
  closeModals(); renderListings(); showToast(t('saved'));
}
function openDelete(id, title) {
  currentListingId = id;
  document.getElementById('deleteText').textContent = `${title}`;
  document.getElementById('deleteModal').classList.add('open');
}
function confirmDelete() {
  const el = document.getElementById(`li-${currentListingId}`);
  if (el) {
    el.style.transition='opacity 0.3s,transform 0.3s';
    el.style.opacity='0';
    el.style.transform='translateX(16px)';
    setTimeout(()=>{ DB.deleteListing(currentListingId); renderListings(); },300);
  }
  closeModals(); showToast(t('deleted'));
}

function openCreateModal() { document.getElementById('createModal').classList.add('open'); }
function createListing() {
  const title = document.getElementById('createTitle').value.trim();
  const price = parseInt(document.getElementById('createPrice').value);
  if (!title||!price) { showToast(t('fillFields')); return; }
  DB.addListing({ title, price, category: document.getElementById('createCat').value, description: document.getElementById('createDesc').value.trim(), image: document.getElementById('createImg').value.trim()||'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop' });
  closeModals(); renderListings(); showToast(t('published'));
  ['createTitle','createPrice','createDesc','createImg'].forEach(id=>document.getElementById(id).value='');
}

function renderFavorites() {
  const items = DB.getFavoriteListings();
  const el = document.getElementById('tab-favorites');
  if (!items.length) { el.innerHTML=`<div class="tab-empty">${t('noFavorites')}</div>`; return; }
  el.innerHTML = `<div class="listings-grid">${items.map(i=>`
    <div class="listing-card">
      <div style="position:relative">
        <img src="${i.image}" class="card-img" alt="">
        ${i.status==='sold'?`<div class="card-badge">${t('sold')}</div>`:''}
      </div>
      <div class="card-body">
        <div class="card-price">${i.price.toLocaleString('ru')} ₸</div>
        <div class="card-title">${i.title}</div>
      </div>
    </div>`).join('')}</div>`;
}

function renderMessages() {
  const msgs = DB.getMessages();
  const el = document.getElementById('tab-messages');
  if (!msgs.length) { el.innerHTML=`<div class="tab-empty">${t('noMessages')}</div>`; return; }
  el.innerHTML = msgs.map(m=>`
    <div class="listing-item">
      <div style="font-size:28px;flex-shrink:0">💬</div>
      <div class="listing-info">
        <div>
          <div class="listing-title">${m.fromName||t('seller')}</div>
          <div style="font-size:13px;color:#555;margin-bottom:6px">${m.text}</div>
          <div class="listing-meta"><span>${new Date(m.createdAt).toLocaleString('ru')}</span></div>
        </div>
        ${!m.read?`<div class="listing-actions"><button class="edit-btn" onclick="DB.markRead(${m.id});renderMessages();updateMsgBadge()">${t('markRead')}</button></div>`:''}
      </div>
    </div>`).join('');
}

function openMsgModal() {
  const msgs = DB.getMessages();
  document.getElementById('msgList').innerHTML = msgs.length
    ? msgs.map(m=>`<div class="listing-item"><div style="font-size:24px;flex-shrink:0">💬</div><div class="listing-info"><div class="listing-title">${m.fromName||t('seller')}</div><div style="font-size:13px;color:#555">${m.text}</div></div></div>`).join('')
    : `<div style="padding:40px;text-align:center;color:#aaa">${t('noMsgsModal')}</div>`;
  document.getElementById('msgModal').classList.add('open');
}

function updateMsgBadge() {
  const n = DB.unreadCount();
  const badge = document.getElementById('tabMsgBadge');
  if (badge) { badge.textContent=n; badge.style.display=n>0?'inline':'none'; }
}

function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open')); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModals();}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});
function openMN() { document.getElementById('mobileNav').classList.add('open'); }
function closeMN() { document.getElementById('mobileNav').classList.remove('open'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

applyLang();
</script>
</body>
</html>
